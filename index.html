<!DOCTYPE html>
<html>
<head>
  <title>For My Melulu 💖</title>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #7a0000;
      color: white;
      text-align: center;
      font-family: 'Quicksand';
      overflow: hidden;
    }

    h1 {
      font-family: 'Pacifico';
      font-size: 45px;
    }

    .hidden { display: none; }

    /* 💖 HEARTS */
    .heart {
      position: absolute;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      from { transform: translateY(100vh); opacity: 1; }
      to { transform: translateY(-10vh); opacity: 0; }
    }

    /* 🎁 GIFT BOXES */
    .gift-container {
      margin-top: 30px;
    }

    .gift {
      width: 100px;
      margin: 20px;
      cursor: pointer;
      transition: 0.3s;
      animation: bounce 2s infinite;
    }

    .gift:hover {
      transform: scale(1.2) rotate(5deg);
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* 💌 POPUP */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.7);

      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .popup.show {
      opacity: 1;
      pointer-events: all;
    }

    /* ✉️ ENVELOPE */
    .envelope {
      width: 400px;
      height: 250px;
      background: #eee;
      position: relative;
      overflow: visible;

      transform: scale(0.8);
      transition: transform 0.4s ease;
    }

    .popup.show .envelope {
      transform: scale(1);
    }

    .flap {
      width: 100%;
      height: 100px;
      background: #ddd;
      position: absolute;
      top: 0;
      transform-origin: top;
      transition: transform 0.6s ease;
    }

    .envelope.open .flap {
      transform: rotateX(180deg);
    }

    /* 💌 LETTER */
    .letter {
      position: absolute;
      top: 100%;
      left: 10px;
      width: 360px;

      background: linear-gradient(145deg, #fff8e7, #fff1d6);
      padding: 20px;
      border-radius: 15px;
      color: black;

      box-shadow: 0 15px 40px rgba(0,0,0,0.3);

      opacity: 0;
      transform: translateY(60px) scale(0.9);
      transition: all 0.6s ease;
    }

    .envelope.open .letter {
      opacity: 1;
      transform: translateY(-220px) scale(1);
    }

    .close-btn {
      margin-top: 15px;
      padding: 8px;
      background: black;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<h1>Gift for you 🎁</h1>

<!-- 🎁 GIFT BOXES -->
<div class="gift-container">
  <img src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" class="gift" onclick="openGift(1)">
  <img src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" class="gift" onclick="openGift(2)">
  <img src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" class="gift" onclick="openGift(3)">
</div>

<!-- 💌 POPUP -->
<div id="popup" class="popup">
  <div class="envelope" id="envelope">
    <div class="flap"></div>

    <div class="letter">
      <h3>My Love 💖</h3>
      <p id="typedText"></p>

      <button class="close-btn" onclick="closePopup()">Close</button>
    </div>
  </div>
</div>

<script>

/* 💌 OPEN GIFT */
function openGift(num){
  let popup = document.getElementById("popup");
  let envelope = document.getElementById("envelope");

  popup.classList.add("show");

  setTimeout(() => {
    envelope.classList.add("open");
    typeText();
  }, 300);
}

/* ✍️ TYPING */
let message = `You mean a lot to me 💖
You are my safe place 🥺
Every moment with you feels special 💕
I love you more than words can explain 💞`;

function typeText(){
  let i = 0;
  let el = document.getElementById("typedText");
  el.innerHTML = "";

  let interval = setInterval(() => {
    el.innerHTML += message[i];
    i++;
    if(i >= message.length) clearInterval(interval);
  }, 30);
}

/* ❌ CLOSE */
function closePopup(){
  document.getElementById("popup").classList.remove("show");
  document.getElementById("envelope").classList.remove("open");
}

/* 💖 FLOATING HEARTS */
setInterval(() => {
  let h = document.createElement("div");
  h.className = "heart";
  h.innerText = "💖";
  h.style.left = Math.random()*100+"vw";
  h.style.fontSize = (10+Math.random()*20)+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},300);

</script>

</body>
</html>
